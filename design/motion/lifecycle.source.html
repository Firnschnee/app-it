<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  .stage{position:relative; width:1040px; height:585px; overflow:hidden;
    background:linear-gradient(168deg,#eef3fc 0%, #e6edf9 60%, #dfe9f8 100%);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;}
  .cap{position:absolute; top:34px; left:0; right:0; text-align:center;
    font-size:21px; font-weight:600; letter-spacing:-0.01em; color:#3c4757;}
  .cap .k{display:inline-block;min-width:24px;padding:2px 8px;margin:0 1px;border-radius:7px;
    background:#fff;border:1px solid #d4dae2;box-shadow:0 1px 0 rgba(27,36,48,.06);
    font-size:18px;color:#1b2430;font-weight:700;}
  .win{position:absolute; top:84px; left:50%; width:660px; transform-origin:50% 100%;}
  .win img{display:block;width:100%;height:auto;}
  .dock{position:absolute; bottom:26px; left:50%; transform:translateX(-50%);
    display:flex; align-items:flex-end; gap:13px; padding:9px 15px; border-radius:24px;
    background:rgba(255,255,255,.62);
    box-shadow:0 1px 0 rgba(255,255,255,.7) inset, 0 12px 36px rgba(27,36,48,.16);
    border:1px solid rgba(255,255,255,.6);}
  .slot{width:52px;height:52px;border-radius:13px;position:relative;}
  .slot.ph{background:linear-gradient(180deg,#fbfcfe,#e9edf3);box-shadow:0 2px 6px rgba(27,36,48,.08);opacity:.9;}
  .slot.app{width:60px;height:60px;}
  .slot.app img{width:60px;height:60px;display:block;border-radius:14px;box-shadow:0 4px 14px rgba(47,111,237,.42);}
  .run{position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:#3a4456;}
  .sep{width:1px;height:46px;background:rgba(27,36,48,.10);margin:0 3px 4px;}
  .cursor{position:absolute;width:22px;height:22px;}
  .cursor svg{display:block}
</style></head>
<body>
  <div class="stage">
    <div class="cap" id="cap"></div>
    <div class="win" id="win"><img src="file:///tmp/hero-assets/window.png" alt=""></div>
    <div class="dock">
      <div class="slot ph"></div>
      <div class="slot ph"></div>
      <div class="sep"></div>
      <div class="slot app" id="appicon"><img src="file:///tmp/hero-assets/icon.png" alt=""><span class="run"></span></div>
      <div class="sep"></div>
      <div class="slot ph"></div>
    </div>
    <div class="cursor" id="cursor"><svg viewBox="0 0 24 24" width="22" height="22"><path d="M3 2l7 18 2.5-7L19 10z" fill="#1b2430" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/></svg></div>
  </div>
<script>
  const p = new URLSearchParams(location.search);
  const f = +p.get('f')||0, n = +p.get('n')||54;
  const x = f/n;                                  // 0..1 normalized time
  const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
  const sm=v=>{v=cl(v,0,1);return v*v*(3-2*v);};  // smoothstep
  const seg=(a,b)=>sm((x-a)/(b-a));               // eased ramp across [a,b]

  // window presence: in over [.24,.46], out over [.74,.90]
  const present = seg(.24,.46)*(1-seg(.74,.90));
  const win=document.getElementById('win');
  const scale=0.92+0.08*present;
  const ty=(1-present)*18;
  win.style.opacity=present.toFixed(3);
  win.style.transform=`translateX(-50%) translateY(${ty.toFixed(1)}px) scale(${scale.toFixed(3)})`;

  // icon launch bounce over [.13,.40] (two damped hops)
  let by=0, isc=1;
  if(x>=.13 && x<=.42){const u=(x-.13)/.29; by=-Math.abs(Math.sin(u*Math.PI*2))*16*(1-u); }
  if(x>=.10 && x<=.16){ isc=0.9+0.1*((x-.10)/.06); }   // quick press-in on click
  const ic=document.getElementById('appicon');
  ic.style.transform=`translateY(${by.toFixed(1)}px) scale(${isc.toFixed(3)})`;

  // cursor: glides to icon, taps around x=.12, fades once window is up
  const cur=document.getElementById('cursor');
  const startX=640,startY=470, dockIconX=556, dockIconY=512; // approx icon center
  const glide=sm(cl(x/ .12,0,1));
  let cx=startX+(dockIconX-startX)*glide;
  let cy=startY+(dockIconY-startY)*glide + by*0.6;
  const curOp = (1-seg(.20,.34));                 // fade cursor as window appears
  cur.style.left=cx+'px'; cur.style.top=cy+'px';
  cur.style.opacity=cl(curOp,0,1).toFixed(2);

  // caption text by beat
  const cap=document.getElementById('cap');
  let html='';
  if(x<.22) html='double-click the Dock icon';
  else if(x<.70) html='a native window — your icon, your app';
  else html='<span class="k">⌘</span><span class="k">Q</span>&nbsp; quits and frees the port';
  cap.innerHTML=html;
  const capOp = Math.min(seg(.02,.10)*(1-seg(.18,.22))+seg(.24,.30)*(1-seg(.66,.70))+seg(.72,.78), 1);
  cap.style.opacity = (x<.22? (1-seg(.18,.22)) : x<.70 ? seg(.24,.30)*(1-seg(.66,.70)) : seg(.72,.78)).toFixed(2);
</script>
</body></html>
